<script>
// ======================== DATA ========================

// Calibration data from txtbooks risograph color swatch scans (2019/2020)
// 5-point LUT: [10%, 30%, 50%, 70%, 100%] scanned RGB (0-1)
const RISO_CAL = {
  'Aqua': { hex:'#7ac7f4', gamma:0.847, grainMul:0.53, fluo:true, lut:[[0.832,0.911,0.944],[0.768,0.883,0.937],[0.593,0.816,0.930],[0.531,0.798,0.938],[0.479,0.782,0.955]] },
  'Black': { hex:'#474a44', gamma:0.481, grainMul:1.54, fluo:false, lut:[[0.688,0.698,0.683],[0.616,0.629,0.612],[0.412,0.425,0.404],[0.333,0.344,0.321],[0.280,0.292,0.267]] },
  'Blue': { hex:'#215cbc', gamma:0.549, grainMul:1.40, fluo:false, lut:[[0.664,0.760,0.876],[0.588,0.707,0.855],[0.324,0.523,0.792],[0.213,0.445,0.772],[0.130,0.361,0.738]] },

let activePaperTex='procedural'; // current paper texture key, or 'procedural'
let paperScanGlTex=null; // WebGL texture object for paper scan (reused)

function loadPaperTexture(key){
  if(key==='procedural'){
    activePaperTex='procedural';
    if(locs.u_usePaperScan) gl.uniform1f(locs.u_usePaperScan,0.0);
    return;
  }
  const tex=PAPER_TEXTURES[key];
  if(!tex) return;
  activePaperTex=key;
  const img=new Image();
  img.onload=function(){
    gl.activeTexture(gl.TEXTURE2);
    if(!paperScanGlTex) paperScanGlTex=gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D,paperScanGlTex);
    gl.texImage2D(gl.TEXTURE_2D,0,gl.LUMINANCE,gl.LUMINANCE,gl.UNSIGNED_BYTE,img);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.REPEAT);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.REPEAT);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
    gl.uniform1i(locs.u_paperScan,2);
    gl.uniform1f(locs.u_usePaperScan,1.0);
    needsRedraw=true;
  };
  img.src=tex.data;
}

function hexRGB(h){return[parseInt(h.slice(1,3),16)/255,parseInt(h.slice(3,5),16)/255,parseInt(h.slice(5,7),16)/255];}
function el(id){return document.getElementById(id);}

// ─── Aspect ratio crop ───
function computeCrop(){
  // Get source dimensions
  let sw, sh;
  if((camOn||(videoOn&&!gifImg))&&$vid&&$vid.videoWidth){sw=$vid.videoWidth;sh=$vid.videoHeight;}
  else if(videoOn&&gifImg&&gifCanvas){sw=gifCanvas.width;sh=gifCanvas.height;}
  else if(srcImg){sw=srcImg.width;sh=srcImg.height;}
  else{cropRect=[0,0,1,1];return;}

  // 'fill' and 'fit' are special modes that use source native aspect
  if(!cropAspect || cropAspect==='fill' || cropAspect==='fit'){
    cropRect=[0,0,1,1];
    return;
  }

  const srcAR=sw/sh;
  const cropAR=cropAspect[0]/cropAspect[1];

  if(cropAR>srcAR){
    // Crop is wider than source: letterbox top/bottom
    const h=srcAR/cropAR;
    cropRect=[0,(1-h)/2,1,h];
  } else {
    // Crop is taller: pillarbox left/right
    const w=cropAR/srcAR;
    cropRect=[(1-w)/2,0,w,1];
  }
}

function setAspect(ratio){
  cropAspect=ratio||[4,3];
  computeCrop();
  needsAspectUpdate=true;
  const ar = (typeof cropAspect === 'string') ? cropAspect : cropAspect.join(':');
  document.querySelectorAll('.aspect-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.ar===ar);
  });
}

let paperOrient='landscape'; // 'landscape' or 'portrait'
function setPaperOrient(orient){
  paperOrient=orient;
  // Aspect ratio is now on the canvas, not the panel
  if($gl){
    if(orient==='portrait'){
      $gl.style.aspectRatio='1/1.414';
    } else {
      $gl.style.aspectRatio='1.414/1';
    }
  }
  needsAspectUpdate=true;
  needsRedraw=true;
}

// Derive active layer count from channels
function activeCount(){return channels.filter(c=>c!==null).length;}

// Get ordered active layers for shader (follows layerOrder for print sequence)
function activeLayers(){
  const out=[];
  for(const i of layerOrder) if(channels[i]!==null) out.push({ch:i, color:channels[i]});
  return out;
}

function cacheInkColors(){
  const layers=activeLayers();
  for(let i=0;i<4;i++){
    if(i<layers.length){
      const c=RISO_COLORS.find(r=>r.name===layers[i].color);
      cached.inkRGB[i]=c?hexRGB(c.hex):[0,0,0];
    }else{
      cached.inkRGB[i]=[0,0,0];
    }
  }
}
function cacheSlider(id,val){cached[id]=parseFloat(val);needsRedraw=true;pushUndo();}

// ======================== UNDO / REDO ========================
const undoStack=[], redoStack=[];
const MAX_UNDO=40;
let undoLock=false; // prevent recursive snapshots during restore
function getState(){
  return JSON.stringify({
    channels:[...channels],
    angles:[...layerAngles],
    dens:[...cached.layerDens],
    prof:activeProf?activeProf.name:null,
    mode,
    grainSize:cached.grainSize, dotGain:cached.dotGain, inkNoise:cached.inkNoise,
    paperTex:cached.paperTex, screenCell:cached.screenCell, grainStatic:cached.grainStatic, ghosting:cached.ghosting,
    imgBright:cached.imgBright, imgContrast:cached.imgContrast, imgSat:cached.imgSat,
    paper:curPaper, paperColor:curPaperColor
  });
}
function pushUndo(){
  if(undoLock) return;
  const s=getState();
  if(undoStack.length && undoStack[undoStack.length-1]===s) return; // no change
  undoStack.push(s);
  if(undoStack.length>MAX_UNDO) undoStack.shift();
  redoStack.length=0; // clear redo on new action
}
function restoreState(json){
  undoLock=true;
  try{
    const s=JSON.parse(json);
    channels=s.channels;
    layerAngles=s.angles;
    cached.layerDens=s.dens;
    mode=s.mode;
    cached.grainSize=s.grainSize; cached.dotGain=s.dotGain; cached.inkNoise=s.inkNoise;
    cached.paperTex=s.paperTex; cached.screenCell=s.screenCell; cached.grainStatic=s.grainStatic; if(s.ghosting!==undefined)cached.ghosting=s.ghosting;
    cached.imgBright=s.imgBright; cached.imgContrast=s.imgContrast; cached.imgSat=s.imgSat;
    // Restore profile ref
    activeProf=s.prof?allProfiles().find(p=>p.name===s.prof)||null:null;
    // Sync UI sliders
    const sliders={imgBright:s.imgBright,imgContrast:s.imgContrast,imgSat:s.imgSat};
    for(const[id,v] of Object.entries(sliders)){const e=document.getElementById(id);if(e)e.value=v;const ve=document.getElementById(id+'Val');if(ve)ve.textContent=v;}
    cacheInkColors();updateUI();needsRedraw=true;
  }finally{ undoLock=false; }
}
function undo(){
  if(undoStack.length<2) return; // need at least 2: current + previous
  redoStack.push(undoStack.pop()); // move current to redo
  restoreState(undoStack[undoStack.length-1]);
}
function redo(){
  if(!redoStack.length) return;
  const s=redoStack.pop();
  undoStack.push(s);
  restoreState(s);
}

function newMisreg(){
  const m=parseFloat(el('misreg').value)/500;
  // When misreg is 0, skew should also be 0 (no plate rotation without misregistration)
  const misregVal=parseFloat(el('misreg').value);
  const skewMax= misregVal > 0 ? cached.skew * Math.PI / 180.0 : 0;
  if(isMono()){
    // Mono: single drum pass — all plates share same offset/skew
    const mx=(Math.random()-.5)*m*2, my=(Math.random()-.5)*m*2;
    const sk=(Math.random()-.5)*2*skewMax;
    for(let i=0;i<4;i++){ misreg[i]=[mx,my]; layerSkews[i]=sk; }
    needsRedraw=true;
    return;
  }
  for(let i=0;i<4;i++){
    misreg[i]=[(Math.random()-.5)*m*2,(Math.random()-.5)*m*2];
    layerSkews[i]=(Math.random()-.5)*2*skewMax;
  }
  // Same-color plates share one master = same misreg offset + skew
  syncSameColorPlates();
  needsRedraw=true;
}

// Lock same-color channels: shared misreg, screen angles, and skew
function syncSameColorPlates(){
  const seen={};
  for(let i=0;i<4;i++){
    const c=channels[i];
    if(!c) continue;
    if(c in seen){
      // Same ink as a previous channel — lock to its offset, angle & skew
      misreg[i]=[...misreg[seen[c]]];
      layerAngles[i]=layerAngles[seen[c]];
      layerSkews[i]=layerSkews[seen[c]];
    } else {
      seen[c]=i;
    }
  }
}

// ======================== COMPARE MODE ========================
let compareOn=false;
function toggleCompare(){
  compareOn=!compareOn;
  const overlay=el('compareOverlay');
  const btn=el('compareBtn');
  if(compareOn && srcImg){
    el('compareImg').src=srcImg.src;
    overlay.classList.add('active');
    btn.classList.add('active');
    initCompareDrag();
  } else {
    compareOn=false;
    overlay.classList.remove('active');
    btn.classList.remove('active');
  }
}
function setComparePos(x){
  const overlay=el('compareOverlay');
  const rect=overlay.getBoundingClientRect();
  const pct=Math.max(0.05,Math.min(0.95,(x-rect.left)/rect.width));
  el('compareImg').style.clipPath=`inset(0 ${(1-pct)*100}% 0 0)`;
  el('compareHandle').style.left=pct*100+'%';
}
function initCompareDrag(){
  const handle=el('compareHandle');
  let dragging=false;
  const onMove=e=>{if(!dragging)return; const x=e.touches?e.touches[0].clientX:e.clientX; setComparePos(x);};
  const onUp=()=>{dragging=false;document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);document.removeEventListener('touchmove',onMove);document.removeEventListener('touchend',onUp);};
  handle.onmousedown=handle.ontouchstart=e=>{e.preventDefault();dragging=true;document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);document.addEventListener('touchmove',onMove,{passive:false});document.addEventListener('touchend',onUp);};
}

// ======================== WEBGL INIT ========================
function initGL(){
  const c=el('gl');
  gl=c.getContext('webgl',{preserveDrawingBuffer:true,antialias:false});
  if(!gl){alert('WebGL required');return;}

  function mkShader(type,src){
    const s=gl.createShader(type);
    gl.shaderSource(s,src);gl.compileShader(s);
    if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){console.error(gl.getShaderInfoLog(s));}
    return s;
  }
  const vs=mkShader(gl.VERTEX_SHADER,el('vs').textContent);
  const fs=mkShader(gl.FRAGMENT_SHADER,el('fs').textContent);
  prog=gl.createProgram();
  gl.attachShader(prog,vs);gl.attachShader(prog,fs);gl.linkProgram(prog);
  if(!gl.getProgramParameter(prog,gl.LINK_STATUS))console.error(gl.getProgramInfoLog(prog));
  gl.useProgram(prog);

  // Quad
  const buf=gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  const ap=gl.getAttribLocation(prog,'a_pos');
  gl.enableVertexAttribArray(ap);
  gl.vertexAttribPointer(ap,2,gl.FLOAT,false,0,0);

  // Cache uniform locations
  ['u_src','u_noise','u_res','u_time','u_frameSeed','u_layers',
   'u_ink0','u_ink1','u_ink2','u_ink3',
   'u_off0','u_off1','u_off2','u_off3',
   'u_angle0','u_angle1','u_angle2','u_angle3','u_screenCell',
   'u_chan0','u_chan1','u_chan2','u_chan3',
   'u_grainSize','u_dotGain','u_dens0','u_dens1','u_dens2','u_dens3','u_inkNoise','u_static','u_resScale','u_bright','u_contrast','u_sat','u_mode','u_sepMode',
   'u_paperColor','u_paperTex','u_paperScan','u_usePaperScan','u_crop','u_paper',
   'u_lutA0','u_lutA1','u_lutA2','u_lutA3',
   'u_lutB0','u_lutB1','u_lutB2','u_lutB3',
   'u_lutC0','u_lutC1','u_lutC2','u_lutC3',
   'u_lutD0','u_lutD1','u_lutD2','u_lutD3',
   'u_inkGamma0','u_inkGamma1','u_inkGamma2','u_inkGamma3',
   'u_grainMul0','u_grainMul1','u_grainMul2','u_grainMul3',
   'u_hasCal0','u_hasCal1','u_hasCal2','u_hasCal3',
   'u_opaque0','u_opaque1','u_opaque2','u_opaque3',
   'u_prevSrc',
   'u_showCropMarks','u_printArea','u_ghosting','u_bleed',
   'u_skew0','u_skew1','u_skew2','u_skew3'
  ].forEach(n=>{locs[n]=gl.getUniformLocation(prog,n);});

  // Blue noise texture (tex unit 1)
  const nTex=gl.createTexture();
  gl.activeTexture(gl.TEXTURE1);gl.bindTexture(gl.TEXTURE_2D,nTex);
  const nd=genBlueNoise(256);
  const rgba=new Uint8Array(256*256*4);
  for(let i=0;i<256*256;i++){rgba[i*4]=rgba[i*4+1]=rgba[i*4+2]=nd[i];rgba[i*4+3]=255;}
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,256,256,0,gl.RGBA,gl.UNSIGNED_BYTE,rgba);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.REPEAT);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.REPEAT);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.uniform1i(locs.u_noise,1);

  // Paper scan texture (tex unit 2)
  const pTex=gl.createTexture();
  gl.activeTexture(gl.TEXTURE2);gl.bindTexture(gl.TEXTURE_2D,pTex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,1,1,0,gl.RGBA,gl.UNSIGNED_BYTE,new Uint8Array([128,128,128,255]));
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.REPEAT);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.REPEAT);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.uniform1i(locs.u_paperScan,2);
  gl.uniform1f(locs.u_usePaperScan,0.0);

  // Load default paper texture
  loadPaperTexture('procedural');

  // Double-buffered source textures: A = current frame (unit 0), B = previous frame (unit 3)
  // Swapped each video/camera frame for inter-frame ghosting
  function makeSrcTex(){
    const t=gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D,t);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
    gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,1,1,0,gl.RGBA,gl.UNSIGNED_BYTE,new Uint8Array([200,190,180,255]));
    return t;
  }
  window._srcTexA=makeSrcTex(); // current frame
  window._srcTexB=makeSrcTex(); // previous frame
  window._srcFlip=false;
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,window._srcTexA);
  gl.activeTexture(gl.TEXTURE3);gl.bindTexture(gl.TEXTURE_2D,window._srcTexB);
  gl.uniform1i(locs.u_src,0);
  gl.uniform1i(locs.u_prevSrc,3);
}

function genBlueNoise(sz){
  // R2 quasi-random sequence with strong scrambling to prevent visible tiling
  const d=new Uint8Array(sz*sz);
  const g=1.32471795724; // plastic constant
  const a1=1/g, a2=1/(g*g);
  for(let y=0;y<sz;y++){
    for(let x=0;x<sz;x++){
      const i=y*sz+x;
      // R2 base
      const r2 = (0.5 + a1*x + a2*y) % 1;
      // Strong integer hash scramble
      let h = (x*374761393 + y*668265263) ^ (x*1274126177);
      h = Math.imul(h ^ (h >>> 13), 1274126177);
      h = Math.imul(h ^ (h >>> 16), 2654435769);
      const hf = ((h >>> 0) & 0xFFFF) / 65536; // to [0,1)
      // Heavy hash blend to break R2 structure
      d[i]=Math.floor(((r2*0.45 + hf*0.55)%1)*255);
    }
  }
  return d;
}


// ======================== RENDER LOOP ========================
function render(){
  requestAnimationFrame(render);

  // Aspect ratio — canvas shape
  if(needsAspectUpdate){
    if(isPhone() && cropAspect && typeof cropAspect !== 'string'){
      $gl.style.aspectRatio = cropAspect[0]+'/'+cropAspect[1];
      $gl.style.width = '';
      $gl.style.height = '';
    } else if(isPhone()){
      $gl.style.aspectRatio = '';
      $gl.style.width = '100%';
      $gl.style.height = '100%';
    } else {
      // Desktop: canvas keeps A3 aspect from CSS, width fills parent
      $gl.style.width = '100%';
      $gl.style.height = '';
      // A3 aspect is set in CSS, don't override unless paperOrient changed
    }
    needsAspectUpdate=false;
    needsRedraw=true;
    if(!isPhone()) setTimeout(()=>{updateCropGuide(0,0,0,0);},50);
  }

  // Upload video frame only when new frame available (camera or uploaded video)
  // Double-buffer: swap src textures so previous frame is preserved in u_prevSrc
  let newCamFrame=false;
  if((camOn||(videoOn&&!gifImg))&&$vid.readyState>=2){
    if(videoFrameReady||!$vid.requestVideoFrameCallback){
      // Swap: current source becomes previous, upload new frame to the other texture
      const tmp=window._srcTexA; window._srcTexA=window._srcTexB; window._srcTexB=tmp;
      window._srcFlip=!window._srcFlip;
      // Upload new frame to the active source texture
      gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,window._srcTexA);
      gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,$vid);
      // Bind previous frame texture
      gl.activeTexture(gl.TEXTURE3);gl.bindTexture(gl.TEXTURE_2D,window._srcTexB);
      gl.uniform1i(locs.u_src,0);
      gl.uniform1i(locs.u_prevSrc,3);
      hasSrc=true;
      videoFrameReady=false;
      newCamFrame=true;
    }
  }
  // GIF mode: gifLoop already uploads texture via gifCanvas, just swap and mark
  if(videoOn&&gifImg&&videoFrameReady){
    const tmp=window._srcTexA; window._srcTexA=window._srcTexB; window._srcTexB=tmp;
    window._srcFlip=!window._srcFlip;
    gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,window._srcTexA);
    // gifLoop already called texImage2D on the previously active texture — re-upload to new active
    gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,gifCanvas);
    gl.activeTexture(gl.TEXTURE3);gl.bindTexture(gl.TEXTURE_2D,window._srcTexB);
    gl.uniform1i(locs.u_src,0);
    gl.uniform1i(locs.u_prevSrc,3);
    videoFrameReady=false;
    newCamFrame=true;
  }

  // ─── Riso-FPS throttle: choppy print-animation feel ───
  // When camera is live, only draw at risoFps intervals
  // Canvas holds previous frame between draws = natural stop-motion choppiness
  const now=performance.now();
  if((camOn||videoOn) && risoFps > 0){
    const interval=1000/risoFps;
    if(now - lastRisoFrame < interval && !needsRedraw){
      // Between riso frames: skip drawing, just update FPS counter
      fpsFrames++;
      if(now-fpsLast>=1000){$fps.textContent=risoFps+'fps';fpsFrames=0;fpsLast=now;}
      return;
    }
    lastRisoFrame=now;
    // Grain boil: large frame jump so each riso-frame has distinct grain pattern
    frame += Math.floor(Math.random()*40)+15;
    frameSeed = Math.random(); // discrete seed — every frame is a new print
    // Per-frame fresh misregistration: each "print" lands slightly differently
    // Scaled by the misreg slider so user controls the magnitude
    if(!isMono()){
      const m=parseFloat(el('misreg').value)/500;
      for(let i=0;i<4;i++){
        misreg[i]=[(Math.random()-.5)*m*2,(Math.random()-.5)*m*2];
      }
    }
  } else {
    // Static image / no camera: normal dirty-flag rendering
    const animating = cached.grainStatic > 0 || videoOn;
    if(!needsRedraw && !newCamFrame && !isRecording && !animating) {
      fpsFrames++;
      if(now-fpsLast>=1000){$fps.textContent='idle';fpsFrames=0;fpsLast=now;}
      return;
    }
    if(animating){
      // Static slider = re-reg animation: re-randomize misregistration like pressing RE-REG
      // Slider value controls FPS (1=2fps, 10=10fps, 20=20fps)
      const staticFps = Math.max(2, cached.grainStatic);
      const staticInterval = 1000 / staticFps;
      if(!window._lastStaticFrame) window._lastStaticFrame = 0;
      if(now - window._lastStaticFrame < staticInterval && !needsRedraw) {
        fpsFrames++;
        return;
      }
      window._lastStaticFrame = now;
      frame++;
      frameSeed = Math.random();
      // Re-reg: fresh misregistration per frame (like pressing RE-REG button)
      newMisreg();
    } else {
      frame++;
      frameSeed = Math.random();
    }
  }
  needsRedraw=false;

  // Canvas sizing — DPR-aware, respects crop aspect in phone mode
  let cssW=$vf.clientWidth, cssH=$vf.clientHeight;
  if(isPhone() && cropAspect){
    const ar=cropAspect[0]/cropAspect[1];
    const containerAR=cssW/cssH;
    if(ar>containerAR){
      // Wider than container: fit to width
      cssH=Math.round(cssW/ar);
    } else {
      // Taller than container: fit to height
      cssW=Math.round(cssH*ar);
    }
  }
  const dpr=Math.min(window.devicePixelRatio||1, 2);
  const baseScale=Math.max(resScale, dpr);
  const dw=Math.round(cssW*baseScale), dh=Math.round(cssH*baseScale);
  if($gl.width!==dw||$gl.height!==dh){$gl.width=dw;$gl.height=dh;}
  gl.viewport(0,0,dw,dh);

  // Uniforms — all from cached values, zero DOM access
  const layers=activeLayers();
  const nLayers=layers.length;
  gl.uniform2f(locs.u_res,dw,dh);
  gl.uniform1f(locs.u_time,frame);
  gl.uniform1f(locs.u_frameSeed,frameSeed);
  gl.uniform1i(locs.u_layers,hasSrc?nLayers:0);
  gl.uniform1i(locs.u_mode,mode==='grain'?0:1);
  gl.uniform1i(locs.u_sepMode,0);
  gl.uniform1f(locs.u_grainSize,cached.grainSize);
  gl.uniform1f(locs.u_dotGain,cached.dotGain);
  gl.uniform1f(locs.u_inkNoise,cached.inkNoise);
  gl.uniform1f(locs.u_paperTex,cached.paperTex);
  gl.uniform1f(locs.u_static,cached.grainStatic);
  gl.uniform1f(locs.u_resScale,resScale);
  gl.uniform1f(locs.u_bright,cached.imgBright);
  gl.uniform1f(locs.u_contrast,cached.imgContrast);
  gl.uniform1f(locs.u_sat,cached.imgSat);
  gl.uniform1f(locs.u_screenCell,cached.screenCell);
  gl.uniform3fv(locs.u_paperColor,cached.paperColor);

  // Cover crop: source image covers the print area (crop aspect ratio), not the full canvas
  // srcUV() remaps canvas UV to print-area space, so u_crop maps source to print area.
  let renderCrop=[0,0,1,1];
  if(hasSrc){
    const srcW=(camOn||(videoOn&&!gifImg))?($vid.videoWidth||1):(gifImg?(gifCanvas.width||1):(srcImg?srcImg.width:1));
    const srcH=(camOn||(videoOn&&!gifImg))?($vid.videoHeight||1):(gifImg?(gifCanvas.height||1):(srcImg?srcImg.height:1));
    // Target AR depends on mode:
    // 'fill' = paper AR (cover entire canvas), 'fit' = source native AR, array = that ratio
    let targetAR;
    if(cropAspect === 'fill') targetAR = dw/dh; // fill the paper
    else if(cropAspect === 'fit') targetAR = srcW/srcH; // use source native
    else if(cropAspect) targetAR = cropAspect[0]/cropAspect[1];
    else targetAR = dw/dh;
    const srcAR=srcW/srcH;
    // Cover: fill target from source (crop excess)
    if(targetAR>srcAR){
      const h=srcAR/targetAR;
      renderCrop=[0,(1-h)/2,1,h];
    } else {
      const w=targetAR/srcAR;
      renderCrop=[(1-w)/2,0,w,1];
    }
    // Update crop guide on phone
    if(isPhone()&&cropAspect) updateCropGuide(dw,dh,srcW,srcH);
    else if(isPhone()){const g=el('phCropGuide');if(g)g.classList.remove('visible');}
    // Desktop: hide crop guide overlay — shader printMask handles the print area visually
    if(!isPhone()){const g=el('deskCropGuide');if(g)g.classList.remove('visible');}
  }
  gl.uniform4f(locs.u_crop,renderCrop[0],renderCrop[1],renderCrop[2],renderCrop[3]);

  // Upload paper white for LUT blending
  gl.uniform3f(locs.u_paper, 0.910, 0.912, 0.908);

  // Send active layers to shader slots 0-3
  const lutALocs=[locs.u_lutA0,locs.u_lutA1,locs.u_lutA2,locs.u_lutA3];
  const lutBLocs=[locs.u_lutB0,locs.u_lutB1,locs.u_lutB2,locs.u_lutB3];
  const lutCLocs=[locs.u_lutC0,locs.u_lutC1,locs.u_lutC2,locs.u_lutC3];
  const lutDLocs=[locs.u_lutD0,locs.u_lutD1,locs.u_lutD2,locs.u_lutD3];
  const gammaLocs=[locs.u_inkGamma0,locs.u_inkGamma1,locs.u_inkGamma2,locs.u_inkGamma3];
  const grainMulLocs=[locs.u_grainMul0,locs.u_grainMul1,locs.u_grainMul2,locs.u_grainMul3];
  const hasCalLocs=[locs.u_hasCal0,locs.u_hasCal1,locs.u_hasCal2,locs.u_hasCal3];
  const opaqueLocs=[locs.u_opaque0,locs.u_opaque1,locs.u_opaque2,locs.u_opaque3];
  const skewLocs=[locs.u_skew0,locs.u_skew1,locs.u_skew2,locs.u_skew3];
  for(let i=0;i<4;i++){
    if(i<nLayers){
      const L=layers[i];
      const cal=RISO_CAL[L.color];
      if(cal){
        // Calibrated ink: upload LUT from scanned data
        const lt=cal.lut;
        gl.uniform1f(opaqueLocs[i], cal.opaque ? 1.0 : 0.0);
        gl.uniform3f(inkLocs[i],lt[4][0],lt[4][1],lt[4][2]); // 100% from scan
        gl.uniform3f(lutALocs[i],lt[0][0],lt[0][1],lt[0][2]); // 10%
        gl.uniform3f(lutBLocs[i],lt[1][0],lt[1][1],lt[1][2]); // 30%
        gl.uniform3f(lutCLocs[i],lt[2][0],lt[2][1],lt[2][2]); // 50%
        gl.uniform3f(lutDLocs[i],lt[3][0],lt[3][1],lt[3][2]); // 70%
        gl.uniform1f(gammaLocs[i],cal.gamma);
        gl.uniform1f(grainMulLocs[i],cal.grainMul);
        gl.uniform1f(hasCalLocs[i],1.0);
      } else {
        // Uncalibrated: use hex color + Beer-Lambert fallback
        const rgb=cached.inkRGB[i];
        gl.uniform3f(inkLocs[i],rgb[0],rgb[1],rgb[2]);
        gl.uniform3f(lutALocs[i],0,0,0);
        gl.uniform3f(lutBLocs[i],0,0,0);
        gl.uniform3f(lutCLocs[i],0,0,0);
        gl.uniform3f(lutDLocs[i],0,0,0);
        gl.uniform1f(gammaLocs[i],1.0);
        gl.uniform1f(grainMulLocs[i],1.0);
        gl.uniform1f(hasCalLocs[i],0.0);
        gl.uniform1f(opaqueLocs[i],0.0);
      }
      gl.uniform2f(offLocs[i],misreg[L.ch][0],misreg[L.ch][1]);
      gl.uniform1f(skewLocs[i],layerSkews[L.ch]||0);
      gl.uniform1f(angLocs[i],(layerAngles[L.ch]||0)*0.01745329);
      gl.uniform1i(chanLocs[i],L.ch); // actual CMYK channel
      gl.uniform1f(densLocs[i],cached.layerDens[L.ch]);
    }else{
      gl.uniform3f(inkLocs[i],0,0,0);
      gl.uniform2f(offLocs[i],0,0);
      gl.uniform1f(skewLocs[i],0);
      gl.uniform1f(angLocs[i],0);
      gl.uniform1i(chanLocs[i],0);
      gl.uniform1f(densLocs[i],0);
      gl.uniform1f(hasCalLocs[i],0.0);
      gl.uniform1f(opaqueLocs[i],0.0);
      gl.uniform1f(gammaLocs[i],1.0);
      gl.uniform1f(grainMulLocs[i],1.0);
    }
  }

  gl.uniform1f(locs.u_showCropMarks, cached.showCropMarks ? 1.0 : 0.0);
  // When static/animation is on, ghosting activates automatically (simulates contact sheet scanning)
  const effectiveGhosting = cached.grainStatic > 0 ? Math.max(cached.ghosting, cached.grainStatic * 1.0) : cached.ghosting;
  gl.uniform1f(locs.u_ghosting, effectiveGhosting * 0.01);
  gl.uniform1f(locs.u_bleed, cached.bleed * 0.01); // bleed slider 0..10 → 0..0.10

  // Compute print area: where the image sits within the A3 paper canvas
  // Margin slider (0-12) maps to 0% - 12% margin
  // 'fill' = image fills entire canvas, 'fit' = image fits with native AR
  {
    const paperW = dw, paperH = dh;
    const paperAR = paperW / paperH;
    const minMargin = cached.margin * 0.01; // margin slider 0-12 → 0%-12%

    if (isPhone()) {
      gl.uniform4f(locs.u_printArea, 0.01, 0.01, 0.01, 0.01);
    } else if (cropAspect === 'fill') {
      // Fill: image fills entire canvas, only margin slider controls border
      const m = Math.max(minMargin, 0.005);
      gl.uniform4f(locs.u_printArea, m, m, m, m);
    } else {
      // For 'fit' or specific ratio: compute image AR within paper
      let imgAR;
      if (cropAspect === 'fit') {
        // Use source image native aspect ratio
        const srcW = (camOn||(videoOn&&!gifImg)) ? ($vid.videoWidth||1) : (gifImg ? (gifCanvas.width||1) : (srcImg ? srcImg.width : 1));
        const srcH = (camOn||(videoOn&&!gifImg)) ? ($vid.videoHeight||1) : (gifImg ? (gifCanvas.height||1) : (srcImg ? srcImg.height : 1));
        imgAR = srcW / srcH;
      } else {
        imgAR = cropAspect[0] / cropAspect[1];
      }
      const availW = 1.0 - 2.0 * minMargin;
      const availH = 1.0 - 2.0 * minMargin;
      let printW, printH;
      if (imgAR > (availW * paperAR) / availH) {
        printW = availW;
        printH = availW * paperAR / imgAR;
        if (printH > availH) { printH = availH; printW = availH * imgAR / paperAR; }
      } else {
        printH = availH;
        printW = availH * imgAR / paperAR;
        if (printW > availW) { printW = availW; printH = availW * paperAR / imgAR; }
      }
      const marginL = (1.0 - printW) / 2.0;
      const marginT = (1.0 - printH) / 2.0;
      gl.uniform4f(locs.u_printArea, marginL, marginT, marginL, marginT);
    }
  }

  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

  // FPS — update DOM only once per second
  fpsFrames++;
  const fpsNow=performance.now();
  if(fpsNow-fpsLast>=1000){
    $fps.textContent=((camOn||videoOn)?risoFps+'fps':fpsFrames+' fps');
    $res.textContent=dw+'×'+dh+(resScale>1?' ('+resScale+'×)':'');
    fpsFrames=0;fpsLast=fpsNow;
  }
}

// Video frame callback — marks when a new video frame is available
function onVideoFrame(){
  videoFrameReady=true;
  if((camOn||videoOn)&&$vid.requestVideoFrameCallback){
    $vid.requestVideoFrameCallback(onVideoFrame);
  }
}

// ======================== SOURCE MANAGEMENT ========================
function pickFile(){el('fileInput').click();}
let gifImg=null, gifCanvas=null, gifCtx=null, gifRafId=0;
function stopVideo(){
  if(videoOn){
    $vid.pause();$vid.removeAttribute('src');$vid.load();
    videoOn=false;
  }
  if(gifRafId){cancelAnimationFrame(gifRafId);gifRafId=0;}
  gifImg=null;
}
function startGifLoop(){
  // Animated GIF: draw <img> to offscreen canvas each frame → upload as texture
  if(!gifImg||!videoOn)return;
  gifCtx.drawImage(gifImg,0,0,gifCanvas.width,gifCanvas.height);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,window._srcTexA);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,gifCanvas);
  videoFrameReady=true;
  needsRedraw=true;
  gifRafId=requestAnimationFrame(startGifLoop);
}
function handleFile(e){
  const f=e.target.files[0];if(!f)return;
  const isVideo=f.type.startsWith('video/');
  const isGif=f.type==='image/gif'||f.name.toLowerCase().endsWith('.gif');
  if(isVideo){
    // Video: load into <video> element and play looped
    stopVideo();
    if(camOn){if(camStream)camStream.getTracks().forEach(t=>t.stop());camOn=false;}
    const url=URL.createObjectURL(f);
    $vid.srcObject=null;
    $vid.src=url;$vid.loop=true;$vid.muted=true;$vid.playsInline=true;
    $vid.onloadeddata=()=>{
      $vid.play();
      videoOn=true;camOn=false;hasSrc=true;needsAspectUpdate=true;computeCrop();
      $status.textContent='▶ VIDEO';
      $res.textContent=$vid.videoWidth+'×'+$vid.videoHeight;
      if($vid.requestVideoFrameCallback){
        $vid.requestVideoFrameCallback(onVideoFrame);
      }else{
        const fb=()=>{if(videoOn&&$vid.readyState>=2)videoFrameReady=true;requestAnimationFrame(fb);};fb();
      }
      needsRedraw=true;
    };
  }else if(isGif){
    // Animated GIF: load into <img>, draw to canvas each frame
    stopVideo();
    if(camOn){if(camStream)camStream.getTracks().forEach(t=>t.stop());camOn=false;}
    const url=URL.createObjectURL(f);
    const img=new Image();
    img.onload=()=>{
      gifImg=img;
      if(!gifCanvas)gifCanvas=document.createElement('canvas');
      gifCanvas.width=img.naturalWidth;gifCanvas.height=img.naturalHeight;
      gifCtx=gifCanvas.getContext('2d');
      // Set srcImg dimensions for aspect ratio calculations
      srcImg=gifCanvas;
      videoOn=true;camOn=false;hasSrc=true;needsAspectUpdate=true;computeCrop();
      $status.textContent='▶ GIF';
      $res.textContent=img.naturalWidth+'×'+img.naturalHeight;
      startGifLoop();
    };
    img.src=url;
  }else{
    // Image: load as before
    stopVideo();
    const r=new FileReader();
    r.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        srcImg=img;
        // Upload to both source textures (no previous frame for static images)
        gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,window._srcTexA);
        gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,img);
        gl.activeTexture(gl.TEXTURE3);gl.bindTexture(gl.TEXTURE_2D,window._srcTexB);
        gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,img);
        camOn=false;hasSrc=true;needsAspectUpdate=true;computeCrop();
        $status.textContent='◉ IMAGE';
        $res.textContent=img.width+'×'+img.height;
      };
      img.src=ev.target.result;
    };
    r.readAsDataURL(f);
  }
  e.target.value='';
  hideOnboarding();
}

function loadSampleImage(){
  // Generate a colorful test image procedurally — hue sweep + color blocks + gradients
  const w=640,h=480;
  const c=document.createElement('canvas');c.width=w;c.height=h;
  const ctx2=c.getContext('2d');
  // Sky-to-ground gradient background
  const bg=ctx2.createLinearGradient(0,0,0,h);
  bg.addColorStop(0,'#4a90d9');bg.addColorStop(0.45,'#87ceeb');bg.addColorStop(0.55,'#8fbc8f');bg.addColorStop(1,'#3a5f3a');
  ctx2.fillStyle=bg;ctx2.fillRect(0,0,w,h);
  // Sun
  const sun=ctx2.createRadialGradient(480,80,10,480,80,80);
  sun.addColorStop(0,'#fff8dc');sun.addColorStop(0.4,'#ffe066');sun.addColorStop(1,'rgba(255,224,102,0)');
  ctx2.fillStyle=sun;ctx2.fillRect(400,0,240,160);
  // Color blocks — arranged like paint swatches
  const colors=['#e63946','#f1a208','#f7e733','#2d6a4f','#457b9d','#1d3557','#6a4c93','#e76f51','#d4a373','#264653','#ef476f','#06d6a0'];
  colors.forEach((col,i)=>{
    const x=20+(i%6)*100, y=140+Math.floor(i/6)*80;
    ctx2.fillStyle=col;ctx2.fillRect(x,y,85,65);
    // Inner highlight
    ctx2.fillStyle='rgba(255,255,255,0.2)';ctx2.fillRect(x+2,y+2,81,20);
  });
  // Grayscale strip
  for(let i=0;i<10;i++){
    const v=Math.round(i*28.3);
    ctx2.fillStyle=`rgb(${v},${v},${v})`;
    ctx2.fillRect(20+i*60,320,55,40);
  }
  // Skin tone strip
  const skins=['#f5d0a9','#e8b88a','#c68c53','#8d5524','#3b1f0a','#f9c9a8','#dba270','#a0612e'];
  skins.forEach((col,i)=>{ctx2.fillStyle=col;ctx2.fillRect(20+i*75,375,68,40);});
  // Hue sweep bar at bottom
  for(let x=0;x<w;x++){
    ctx2.fillStyle=`hsl(${x/w*360},85%,50%)`;
    ctx2.fillRect(x,430,1,35);
  }
  // Load into WebGL
  const img=new Image();
  img.onload=()=>{
    srcImg=img;
    gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,window._srcTexA);
    gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,img);
    gl.activeTexture(gl.TEXTURE3);gl.bindTexture(gl.TEXTURE_2D,window._srcTexB);
    gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,img);
    hasSrc=true;needsAspectUpdate=true;computeCrop();
    $status.textContent='● SAMPLE';
    $res.textContent=w+'×'+h;
  };
  img.src=c.toDataURL('image/jpeg',0.92);
}

function showOnboarding(){

  el('viewfinder').appendChild(hint);
}
function hideOnboarding(){const h=document.getElementById('onboardHint');if(h)h.remove();}

async function toggleCam(){
  if(camOn){
    if(camStream)camStream.getTracks().forEach(t=>t.stop());
    camOn=false;el('camBtn').textContent='CAMERA';
    if(srcImg){
      gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,window._srcTexA);
      gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,srcImg);
      gl.activeTexture(gl.TEXTURE3);gl.bindTexture(gl.TEXTURE_2D,window._srcTexB);
      gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,srcImg);
    }
    needsAspectUpdate=true;
    $status.textContent=srcImg?'◉ IMAGE':'● READY';
    return;
  }
  try{
    stopVideo(); // stop any uploaded video before starting camera
    camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode,width:{ideal:isPhone()?640:1280}}});
    $vid.srcObject=camStream;
    // Wait for video to actually start playing
    await $vid.play();
    camOn=true;needsAspectUpdate=true;computeCrop();
    el('camBtn').textContent='STOP CAM';
    $status.textContent='● LIVE';
    hideOnboarding();
    // Use requestVideoFrameCallback if available (Chrome/Edge)
    if($vid.requestVideoFrameCallback){
      $vid.requestVideoFrameCallback(onVideoFrame);
    }else{
      // Fallback: mark ready every animation frame
      const fallback=()=>{if(camOn&&$vid.readyState>=2)videoFrameReady=true;requestAnimationFrame(fallback);};
      fallback();
    }
  }catch(e){toast('Camera not available');}
}

// ======================== SAVE ========================
async function saveHiRes(){
  const unique=[...new Set(channels.filter(c=>c))];
  const names=unique.join('-').replace(/[\s.]/g,'');
  const dpr=Math.min(window.devicePixelRatio||1,2);
  const scale=Math.max(resScale,dpr);

  if(cropAspect){
    // Save at the crop aspect ratio
    const cropAR=cropAspect[0]/cropAspect[1];
    const baseW=$vf.clientWidth;
    const saveW=Math.round(baseW*scale);
    const saveH=Math.round(saveW/cropAR);
    $gl.width=saveW;$gl.height=saveH;
    gl.viewport(0,0,saveW,saveH);
    // Use cropRect (letterbox/pillarbox of source to fit target aspect)
    gl.uniform4f(locs.u_crop,cropRect[0],cropRect[1],cropRect[2],cropRect[3]);
    gl.uniform2f(locs.u_res,saveW,saveH);
    // Save canvas is crop-shaped: image fills it with small margins
    gl.uniform4f(locs.u_printArea, 0.01, 0.01, 0.01, 0.01);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
    const filename='risocam_'+(names||'empty')+'_'+saveW+'x'+saveH+'_'+Date.now()+'.png';
    const blob=await new Promise(r=>$gl.toBlob(b=>r(b),'image/png'));
    needsRedraw=true;
    await doSaveBlob(blob,filename,saveW,saveH);
  } else if(hasSrc){
    // No crop aspect: save at source native aspect
    const srcW=(camOn||(videoOn&&!gifImg))?($vid.videoWidth||1):(gifImg?(gifCanvas.width||1):(srcImg?srcImg.width:1));
    const srcH=(camOn||(videoOn&&!gifImg))?($vid.videoHeight||1):(gifImg?(gifCanvas.height||1):(srcImg?srcImg.height:1));
    const srcAR=srcW/srcH;
    const baseW=$vf.clientWidth;
    const saveW=Math.round(baseW*scale);
    const saveH=Math.round(saveW/srcAR);
    $gl.width=saveW;$gl.height=saveH;
    gl.viewport(0,0,saveW,saveH);
    gl.uniform4f(locs.u_crop,0,0,1,1);
    gl.uniform2f(locs.u_res,saveW,saveH);
    gl.uniform4f(locs.u_printArea, 0.01, 0.01, 0.01, 0.01);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
    const filename='risocam_'+(names||'empty')+'_'+saveW+'x'+saveH+'_'+Date.now()+'.png';
    const blob=await new Promise(r=>$gl.toBlob(b=>r(b),'image/png'));
    needsRedraw=true;
    await doSaveBlob(blob,filename,saveW,saveH);
  } else {
    // No source, just save what's on screen
    const dw=$gl.width, dh=$gl.height;
    const filename='risocam_'+(names||'empty')+'_'+dw+'x'+dh+'_'+Date.now()+'.png';
    const blob=await new Promise(r=>$gl.toBlob(b=>r(b),'image/png'));
    await doSaveBlob(blob,filename,dw,dh);
  }
}

async function doSaveBlob(blob,filename,w,h){
  // On mobile: use Web Share API to save to Photos app
  if(navigator.share && /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)){
    try{
      const file=new File([blob],filename,{type:blob.type});
      await navigator.share({files:[file]});
      toast('Shared '+w+'×'+h+'!');
      return;
    }catch(e){
      if(e.name==='AbortError') return; // user cancelled
      // Fall through to download
    }
  }
  // Desktop: standard download
  const link=document.createElement('a');
  link.download=filename;
  link.href=URL.createObjectURL(blob);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  setTimeout(()=>URL.revokeObjectURL(link.href),1000);
  toast('Saved '+w+'×'+h+'!');
}

async function exportSeparations(){
  const layers=activeLayers();
  if(!layers.length){toast('No channels to export');return;}
  if(!hasSrc){toast('No image loaded');return;}

  toast('Rendering separations…');

  const ts=Date.now();
  const dw=$gl.width, dh=$gl.height;
  gl.viewport(0,0,dw,dh);

  // Set separation mode
  gl.uniform1i(locs.u_sepMode,1);
  gl.uniform1i(locs.u_layers,layers.length);
  gl.uniform2f(locs.u_res,dw,dh);
  gl.uniform1f(locs.u_grainSize,cached.grainSize);
  gl.uniform1f(locs.u_dotGain,cached.dotGain);
  gl.uniform1f(locs.u_inkNoise,cached.inkNoise);
  gl.uniform1f(locs.u_paperTex,cached.paperTex);
  gl.uniform1f(locs.u_static,cached.grainStatic);
  gl.uniform1f(locs.u_ghosting,cached.ghosting*0.01);
  gl.uniform1f(locs.u_bleed,cached.bleed*0.01);
  gl.uniform1f(locs.u_resScale,resScale);
  gl.uniform1f(locs.u_frameSeed,frameSeed);
  gl.uniform1f(locs.u_bright,cached.imgBright);
  gl.uniform1f(locs.u_contrast,cached.imgContrast);
  gl.uniform1f(locs.u_sat,cached.imgSat);
  gl.uniform1f(locs.u_screenCell,cached.screenCell);
  gl.uniform3fv(locs.u_paperColor,cached.paperColor);
  gl.uniform4f(locs.u_crop,cropRect[0],cropRect[1],cropRect[2],cropRect[3]);
  gl.uniform1i(locs.u_mode,mode==='grain'?0:1);
  gl.uniform4f(locs.u_printArea, 0.01, 0.01, 0.01, 0.01); // separations: minimal margins

  // Render each separation and collect as blobs
  const files=[];
  for(let i=0;i<layers.length;i++){
    const L=layers[i];
    const cal=RISO_CAL[L.color];
    if(cal){
      const lt=cal.lut;
      gl.uniform3f(inkLocs[0],lt[4][0],lt[4][1],lt[4][2]);
      gl.uniform1f(locs.u_inkGamma0,cal.gamma);
      gl.uniform1f(locs.u_grainMul0,cal.grainMul);
      gl.uniform1f(locs.u_hasCal0,1.0);
    } else {
      const rgb=cached.inkRGB[i];
      gl.uniform3f(inkLocs[0],rgb[0],rgb[1],rgb[2]);
      gl.uniform1f(locs.u_inkGamma0,1.0);
      gl.uniform1f(locs.u_grainMul0,1.0);
      gl.uniform1f(locs.u_hasCal0,0.0);
    }
    gl.uniform2f(offLocs[0],misreg[L.ch][0],misreg[L.ch][1]);
    gl.uniform1f(skewLocs[0],layerSkews[L.ch]||0);
    gl.uniform1f(angLocs[0],(layerAngles[L.ch]||0)*0.01745329);
    gl.uniform1i(chanLocs[0],L.ch);
    gl.uniform1f(densLocs[0],cached.layerDens[L.ch]);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

    const colorName=L.color.replace(/[\s.]/g,'');
    const chName=CH_NAMES[L.ch];
    const filename='sep_'+chName+'_'+colorName+'_'+dw+'x'+dh+'.png';

    // Canvas toBlob as promise
    const blob=await new Promise(r=>{
      const tmpC=document.createElement('canvas');
      tmpC.width=dw;tmpC.height=dh;
      const ctx=tmpC.getContext('2d');
      ctx.drawImage($gl,0,0);
      tmpC.toBlob(b=>r(b),'image/png');
    });
    files.push({name:filename, blob});
  }

  // Restore normal mode
  gl.uniform1i(locs.u_sepMode,0);

  // Build zip
  const zip=new JSZip();
  files.forEach(f=>zip.file(f.name,f.blob));
  const zipBlob=await zip.generateAsync({type:'blob'});
  const names=layers.map(L=>L.color.replace(/[\s.]/g,'')).join('+');
  const zipName='riso_seps_'+names+'_'+dw+'x'+dh+'_'+ts+'.zip';

  // On mobile: share individual images (more useful than a zip for Photos)
  // Download as zip
  const link=document.createElement('a');
  link.download=zipName;
  link.href=URL.createObjectURL(zipBlob);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  setTimeout(()=>URL.revokeObjectURL(link.href),1000);
  toast(files.length+' separation'+(files.length>1?'s':'')+' saved!');
  needsRedraw=true;
}

// ======================== UI ========================
const CH_NAMES=['C','M','Y','K'];
// Click color in palette → assign to first empty slot, or toggle off
let openPicker=-1; // which channel's picker is open (-1=none)

function togglePicker(ch){
  openPicker = openPicker===ch ? -1 : ch;
  buildChannelUI();
  if(el('phChannelList')&&el('phChannelList').children.length) buildChannelUI('phChannelList');
}

// Mono detection: all channels set to the same ink
function isMono(){
  const active=channels.filter(c=>c!==null);
  return active.length===4 && new Set(active).size===1;
}

function pickColor(ch, name){
  if(isMono()||ch==='mono'){
    // In mono: change all 4 channels at once
    for(let i=0;i<4;i++) channels[i]=name;
  } else {
    channels[ch]=name;
  }
  openPicker=-1;
  onChannelsChanged();
}

function setMonoDens(val){
  const v=parseFloat(val);
  for(let i=0;i<4;i++) cached.layerDens[i]=v;
  needsRedraw=true;
}

function setMonoAngle(deg){
  for(let i=0;i<4;i++) layerAngles[i]=deg;
  buildChannelUI();
  if(el('phChannelList')&&el('phChannelList').children.length) buildChannelUI('phChannelList');
  needsRedraw=true;
}

// Map profile colors to 4 CMYK slots (always fill all 4)
function mapProfileToSlots(colors){
  if(colors.length===1) return [colors[0],colors[0],colors[0],colors[0]];
  if(colors.length===2) return [colors[0],colors[1],colors[1],colors[0]]; // dark on C+K, warm on M+Y
  if(colors.length===3) return [colors[0],colors[1],colors[2],colors[0]]; // first color doubles on K
  return [colors[0],colors[1],colors[2],colors[3]];
}

// Grouped ink list for dropdown
const INK_LIST=[
  {group:'Standard',inks:['Black','Blue','Bright Red','Yellow','White']},
  {group:'Warm',inks:['Orange','Cranberry','Brick','Brown','Flat Gold']},
  {group:'Cool',inks:['Teal','Cornflower','Turquoise','Federal Blue','Purple','Violet']},
  {group:'Fluorescent',inks:['Fl. Pink','Fl. Yellow','Fl. Orange','Fl. Green','Hunter Green']},
];

  {name:'Cyan', badge:'C', cls:'ch-badge-c', grad:'linear-gradient(90deg,#00bcd4,#e0f7fa)'},
  {name:'Magenta', badge:'M', cls:'ch-badge-m', grad:'linear-gradient(90deg,#e91e63,#fce4ec)'},
  {name:'Yellow', badge:'Y', cls:'ch-badge-y', grad:'linear-gradient(90deg,#fdd835,#fffde7)'},

function buildChannelUI(targetId){
  const list=el(targetId||'channelList');
  if(!list)return;
  list.innerHTML='';
  const angles=[0,15,30,45,60,75,90];
  const isScreen=mode==='screen';

  // ─── Mono mode: single consolidated row ───
  if(isMono()){
    const name=channels[0];
    const rc=name?RISO_COLORS.find(r=>r.name===name):null;
    const hex=rc?rc.hex:'#ccc';
    const isOpen=openPicker===0;
    const isWhite=name==='White';
    const dens=Math.round(cached.layerDens[0]);
    const trackBg=rc?`linear-gradient(90deg,${hex}15,${hex})`:`linear-gradient(90deg,#eee,#aaa)`;
    const curAngle=layerAngles[0]||0;

    let html=`<div class="ch-slot">`;
    html+=`<div class="ch-mono-row">
      <span class="ch-mono-label">MONO</span>
      <div class="ch-color-btn${isWhite?' white-border':''}${isOpen?' open':''}" style="background:${hex}" onclick="togglePicker(0)"></div>
      <input type="range" class="ch-dens" min="0" max="100" value="${dens}" step="2"
        oninput="setMonoDens(this.value)"
        style="background:${trackBg}">`;
    if(isScreen){
      html+=`<div class="ch-angles">`;
      angles.forEach(a=>{
        html+=`<button class="ch-angle-btn${curAngle===a?' active':''}" onclick="event.stopPropagation();setMonoAngle(${a})">${a}°</button>`;
      });
      html+=`</div>`;
    }
    html+=`</div>`;
    // Color picker dropdown
    html+=`<div class="ch-dropdown${isOpen?' open':''}">`;
    INK_LIST.forEach((g,gi)=>{
      if(gi>0) html+=`<div class="ch-dropdown-sep"></div>`;
      g.inks.forEach(n=>{
        const irc=RISO_COLORS.find(r=>r.name===n);
        if(!irc) return;
        const esc=n.replace(/'/g,"\\'");
        const sel=name===n?' selected':'';
        const wc=n==='White'?' white-dot':'';
        html+=`<div class="ch-dropdown-item${sel}" onclick="event.stopPropagation();pickColor('mono','${esc}')">
          <span class="ch-dropdown-dot${wc}" style="background:${irc.hex}"></span>
          <span class="ch-dropdown-name">${n}</span>
        </div>`;
      });
    });
    html+=`</div></div>`;
    list.insertAdjacentHTML('beforeend',html);
    return; // No drag, no multi-row
  }

  // Build link groups: channels sharing same ink color
  const linkGroups={};
  for(let i=0;i<4;i++){
    const c=channels[i];
    if(!c) continue;
    if(!linkGroups[c]) linkGroups[c]=[];
    linkGroups[c].push(i);
  }
  // Only mark as linked if >1 channel shares the color
  const linkedColor={}; // ch index → ink hex (only if linked)
  for(const [color,chs] of Object.entries(linkGroups)){
    if(chs.length>1){
      const rc=RISO_COLORS.find(r=>r.name===color);
      const hex=rc?rc.hex:'#888';
      for(const ch of chs) linkedColor[ch]=hex;
    }
  }

  // ─── Multi-layer mode: individual rows with drag handles ───
  for(let pos=0;pos<4;pos++){
    const i=layerOrder[pos]; // actual CMYK channel index
    const name=channels[i];
    const rc=name?RISO_COLORS.find(r=>r.name===name):null;
    const hex=rc?rc.hex:'#ccc';
    const isOpen=openPicker===i;
    const m=CH_META[i];
    const isWhite=name==='White';
    const dens=Math.round(cached.layerDens[i]);
    const trackBg=rc?`linear-gradient(90deg,${hex}15,${hex})`:`linear-gradient(90deg,#eee,#aaa)`;
    const curAngle=layerAngles[i]||0;
    const isLinked=i in linkedColor;

    let html=`<div class="ch-slot" data-ch="${i}" data-pos="${pos}">`;
    // Compact row: [drag] [badge] [color-btn] [density slider] [angle buttons]
    html+=`<div class="ch-row">
      <span class="ch-drag" data-drag="${pos}">⡇</span>
      <span class="ch-badge ${m.cls}">${m.badge}</span>
      <div class="ch-color-btn${isWhite?' white-border':''}${isOpen?' open':''}" style="background:${hex}" onclick="togglePicker(${i})"></div>
      <input type="range" class="ch-dens" min="0" max="100" value="${dens}" step="2"
        oninput="setChannelDens(${i},this.value)"
        style="background:${trackBg}">`;
    if(isScreen){
      const linkStyle=isLinked?` style="border-bottom:2px solid ${linkedColor[i]};padding-bottom:1px"`:' ';
      html+=`<div class="ch-angles"${linkStyle}>`;
      angles.forEach(a=>{
        html+=`<button class="ch-angle-btn${curAngle===a?' active':''}" onclick="event.stopPropagation();setAngle(${i},${a})">${a}°</button>`;
      });
      html+=`</div>`;
    }
    html+=`</div>`;
    html+=`<div class="ch-dropdown${isOpen?' open':''}">`;
    INK_LIST.forEach((g,gi)=>{
      if(gi>0) html+=`<div class="ch-dropdown-sep"></div>`;
      g.inks.forEach(n=>{
        const irc=RISO_COLORS.find(r=>r.name===n);
        if(!irc) return;
        const esc=n.replace(/'/g,"\\'");
        const sel=name===n?' selected':'';
        const wc=n==='White'?' white-dot':'';
        html+=`<div class="ch-dropdown-item${sel}" onclick="event.stopPropagation();pickColor(${i},'${esc}')">
          <span class="ch-dropdown-dot${wc}" style="background:${irc.hex}"></span>
          <span class="ch-dropdown-name">${n}</span>
        </div>`;
      });
    });
    html+=`</div></div>`;
    list.insertAdjacentHTML('beforeend',html);
  }
  initLayerDrag(list);
}


// ─── Layer drag-to-reorder ───
function initLayerDrag(container){
  const slots=container.querySelectorAll('.ch-slot');
  const handles=container.querySelectorAll('.ch-drag');
  let dragPos=-1, overPos=-1;

  handles.forEach(h=>{
    h.addEventListener('pointerdown',e=>{
      e.preventDefault();
      dragPos=parseInt(h.dataset.drag);
      h.setPointerCapture(e.pointerId);
      slots[dragPos].classList.add('dragging');
    });
    h.addEventListener('pointermove',e=>{
      if(dragPos<0)return;
      // Find which slot we're over based on Y position
      const newOver=findSlotAt(slots,e.clientY);
      if(newOver!==overPos){
        slots.forEach(s=>{s.classList.remove('drag-over-above','drag-over-below');});
        if(newOver>=0&&newOver!==dragPos){
          slots[newOver].classList.add(newOver<dragPos?'drag-over-above':'drag-over-below');
        }
        overPos=newOver;
      }
    });
    h.addEventListener('pointerup',e=>{
      if(dragPos<0)return;
      slots.forEach(s=>{s.classList.remove('dragging','drag-over-above','drag-over-below');});
      if(overPos>=0&&overPos!==dragPos){
        // Reorder: move dragPos to overPos
        const item=layerOrder.splice(dragPos,1)[0];
        layerOrder.splice(overPos,0,item);
        cacheInkColors();
        needsRedraw=true;
        buildChannelUI();
      }
      dragPos=-1;overPos=-1;
    });
    h.addEventListener('pointercancel',()=>{
      slots.forEach(s=>{s.classList.remove('dragging','drag-over-above','drag-over-below');});
      dragPos=-1;overPos=-1;
    });
  });
}

function findSlotAt(slots,clientY){
  for(let i=0;i<slots.length;i++){
    const r=slots[i].getBoundingClientRect();
    if(clientY>=r.top&&clientY<r.bottom) return i;
  }
  return -1;
}

function phStartRec(){
  const stream=$gl.captureStream(risoFps);
  if(typeof MediaRecorder==='undefined'){toast('Recording not supported');return;}
  let mimeType='video/mp4';
  let ext='mp4';
  if(!MediaRecorder.isTypeSupported(mimeType)){
    mimeType='video/webm;codecs=vp9';ext='webm';
    if(!MediaRecorder.isTypeSupported(mimeType)){
      mimeType='video/webm';
      if(!MediaRecorder.isTypeSupported(mimeType)){toast('No recording codec');return;}
    }
  }
  window._recMime=mimeType;window._recExt=ext;
  window._recChunks=[];
  window._recorder=new MediaRecorder(stream,{mimeType});
  window._recorder.ondataavailable=e=>{if(e.data.size>0)window._recChunks.push(e.data);};
  window._recorder.onstop=async()=>{
    const blob=new Blob(window._recChunks,{type:window._recMime});
    const filename='riso_'+Date.now()+'.'+window._recExt;
    // Mobile: share to Photos app
    if(navigator.share && /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)){
      try{
        const file=new File([blob],filename,{type:blob.type});
        await navigator.share({files:[file]});
        toast('VIDEO SHARED');
        return;
      }catch(e){if(e.name==='AbortError')return;}
    }
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=filename;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    toast('VIDEO SAVED');
  };
  window._recorder.start(100);
  isRecording=true;recStart=Date.now();
  el('phShutter').classList.add('recording');
  const badge=el('phRecBadge');badge.classList.add('show');
  recTimer=setInterval(()=>{
    const s=Math.floor((Date.now()-recStart)/1000);
    badge.textContent='● REC '+String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
  },500);
}

function phStopRec(){
  if(window._recorder&&window._recorder.state!=='inactive') window._recorder.stop();
  isRecording=false;
  el('phShutter').classList.remove('recording');
  el('phRecBadge').classList.remove('show');
  if(recTimer){clearInterval(recTimer);recTimer=null;}
}

function phToggleOverlay(name){
  if(currentOverlay===name){phCloseOverlay();return;}
  phCloseOverlay();
  currentOverlay=name;
  const capName=name.charAt(0).toUpperCase()+name.slice(1);
  const ov=el('phOv'+capName);
  if(ov){
    ov.classList.add('open');
    el('phBackdrop').classList.add('show');
    // Highlight action circle
    const labelMap={channels:'ink',look:'look',settings:'fx'};
    document.querySelectorAll('.ph-action-circle').forEach(c=>{
      const n=c.querySelector('.ph-action-label');
      if(n&&n.textContent.toLowerCase()===(labelMap[name]||''))
        c.classList.add('open');
    });
    phPopulateOverlay(name);
  }
}

function phCloseOverlay(){
  document.querySelectorAll('.ph-overlay').forEach(o=>o.classList.remove('open'));
  el('phBackdrop').classList.remove('show');
  document.querySelectorAll('.ph-action-circle').forEach(c=>c.classList.remove('open'));
  currentOverlay=null;
}

function phPopulateOverlay(name){
  if(name==='channels'){
    const body=el('phChannelsBody');
    if(!body.dataset.built){
      body.innerHTML='<div class="channel-list" id="phChannelList"></div>';
      body.dataset.built='1';
    }
    buildChannelUI('phChannelList');
  } else if(name==='look'){
    const body=el('phLookBody');
    // Profiles section
    let html='<div style="padding:0 12px"><div class="section-header" style="font-size:10px;letter-spacing:1px;padding:6px 4px;margin-bottom:4px;border-bottom:1px solid #333;color:#888">PROFILES</div>';
    html+='<div class="profiles-body" id="phProfileGrid"></div>';
    // Paper section
    html+='<div class="section-header" style="font-size:10px;letter-spacing:1px;padding:6px 4px;margin:12px 0 4px;border-bottom:1px solid #333;color:#888">PAPER</div>';
    html+='<div style="display:flex;gap:6px;flex-wrap:wrap;padding:4px 0">';
    PAPER_COLORS.forEach((c,i)=>{
      const border=c.hex==='#2a2a28'?'border-color:#888;':'';
      html+=`<div class="paper-dot${i===curPaperColor?' active':''}" onclick="setPaperColor(${i})" style="background:${c.hex};${border};width:28px;height:28px" title="${c.name}"></div>`;
    });
    html+='</div>';
    // Paper texture type
    html+='<div style="display:flex;gap:4px;flex-wrap:wrap;padding:4px 0">';
    const texKeys=['procedural','riso_standard','smooth','kraft','textured'];
    const texLabels={procedural:'Standard',riso_standard:'Natural',smooth:'Smooth',kraft:'Kraft',textured:'Textured'};
    texKeys.forEach(k=>{
      html+=`<button class="paper-tex-btn ph-paper-tex-btn${k===activePaperTex?' active':''}" data-tex="${k}" onclick="setPaperTex('${k}')" style="color:#aaa;border-color:#555;background:#222">${texLabels[k]}</button>`;
    });
    html+='</div></div>';
    body.innerHTML=html;
    renderProfiles('phProfileGrid');
  } else if(name==='settings'){
    const body=el('phSettingsBody');
    body.innerHTML=`
      <div class="settings-body" style="padding:10px 14px">
        <div style="display:flex;gap:6px;margin-bottom:12px">
          <button class="mode-btn ${mode==='grain'?'active':''}" onclick="setMode('grain');el('phModeBtn').textContent='GRAIN'">GRAIN</button>
          <button class="mode-btn ${mode==='screen'?'active':''}" onclick="setMode('screen');el('phModeBtn').textContent='SCREEN'">SCREEN</button>
        </div>
        <div class="slider-row"><span class="slider-label">Grain Size</span><input type="range" id="phGrainSize" min="0.5" max="3" value="${cached.grainSize}" step="0.1"><span class="slider-value" id="phGrainSizeVal">${cached.grainSize}</span></div>
        <div class="slider-row"><span class="slider-label">Screen Cell</span><input type="range" id="phScreenCell" min="3" max="20" value="${cached.screenCell}" step="1"><span class="slider-value" id="phScreenCellVal">${cached.screenCell}</span></div>
        <div class="slider-row"><span class="slider-label">Dot Gain</span><input type="range" id="phDotGain" min="0" max="25" value="${cached.dotGain}" step="1"><span class="slider-value" id="phDotGainVal">${cached.dotGain}</span></div>
        <div class="slider-row"><span class="slider-label">Misregister</span><input type="range" id="phMisreg" min="0" max="10" value="${el('misreg').value}" step="1"><span class="slider-value" id="phMisregVal">${el('misreg').value}</span></div>
        <div class="slider-row"><span class="slider-label">Ink Noise</span><input type="range" id="phInkNoise" min="0" max="30" value="${cached.inkNoise}" step="2"><span class="slider-value" id="phInkNoiseVal">${cached.inkNoise}</span></div>
        <div class="slider-row"><span class="slider-label">Paper Tex</span><input type="range" id="phPaperTex" min="0" max="25" value="${el('paperTex').value}" step="1"><span class="slider-value" id="phPaperTexVal">${el('paperTex').value}</span></div>
        <div class="slider-row"><span class="slider-label">Static</span><input type="range" id="phGrainStatic" min="0" max="20" value="${cached.grainStatic}" step="1"><span class="slider-value" id="phGrainStaticVal">${cached.grainStatic}</span></div>
        <div class="slider-row"><span class="slider-label">Ghosting</span><input type="range" id="phGhosting" min="0" max="30" value="${cached.ghosting}" step="2"><span class="slider-value" id="phGhostingVal">${cached.ghosting}</span></div>
        <div class="slider-row"><span class="slider-label">Bleed</span><input type="range" id="phBleed" min="0" max="10" value="${cached.bleed}" step="1"><span class="slider-value" id="phBleedVal">${cached.bleed}</span></div>
      </div>`;
    phBindSliders();
  }
}

function phBindSliders(){
  const map=[
    ['phGrainSize','grainSize','grainSize'],
    ['phScreenCell','screenCell','screenCell'],
    ['phDotGain','dotGain','dotGain'],
    ['phMisreg','misreg',null],
    ['phInkNoise','inkNoise','inkNoise'],
    ['phPaperTex','paperTex',null],
    ['phGrainStatic','grainStatic','grainStatic'],
    ['phGhosting','ghosting','ghosting'],
    ['phBleed','bleed','bleed'],
  ];
  map.forEach(([phId,deskId,cacheKey])=>{
    const phEl=el(phId);
    if(!phEl)return;
    phEl.addEventListener('input',()=>{
      const v=parseFloat(phEl.value);
      const desk=el(deskId);
      if(desk)desk.value=v;
      const phVal=el(phId+'Val');
      if(phVal)phVal.textContent=v;
      const deskVal=el(deskId+'Val');
      if(deskVal)deskVal.textContent=v;
      if(deskId==='misreg'){newMisreg();return;}
      if(deskId==='paperTex'){cached.paperTex=v;needsRedraw=true;return;}
      if(cacheKey){cached[cacheKey]=v;needsRedraw=true;}
    });
  });
}

// Move canvas between desktop/phone viewfinders
function layoutSwitch(){
  const phone=isPhone();
  if(phone===lastLayoutPhone)return;
  lastLayoutPhone=phone;
  if(phone){
    const phVf=el('phViewfinder');
    const recBadge=el('phRecBadge');
    phVf.insertBefore($gl,recBadge);
    phVf.insertBefore($vid,recBadge);
    $vf=phVf;
    // Auto-start camera on phone if no source
    if(!hasSrc&&!camOn) toggleCam();
    // Bind BCS sliders
    phBindBcs();
  } else {
    const vf=el('viewfinder');
    const sb=vf.querySelector('.status-bar');
    vf.insertBefore($gl,sb);
    vf.insertBefore($vid,sb);
    $vf=vf;
    phCloseOverlay();
  }
  needsAspectUpdate=true;
}

// Update aspect buttons across both UIs
const origSetAspect=setAspect;
setAspect=function(ratio){
  cropAspect=ratio||[4,3];
  computeCrop();
  needsAspectUpdate=true;
  const key=cropAspect.join(':');
  document.querySelectorAll('.aspect-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.ar===key);
  });
  // Sync phone aspect button text
  const phBtn=el('phAspectBtn');
  if(phBtn){
    const idx=ASPECT_CYCLE.findIndex(a=>a&&cropAspect&&a[0]===cropAspect[0]&&a[1]===cropAspect[1]);
    if(idx>=0){aspectIdx=idx;phBtn.textContent=ASPECT_LABELS[idx];}
  }
};

document.addEventListener('DOMContentLoaded',()=>{
  $gl=el('gl'); $vf=el('viewfinder'); $vid=el('vid');
  $fps=el('fps'); $res=el('resBadge'); $status=el('statusBadge');

  renderColors();renderProfiles();renderPaperUI();bindSliders();bindChannelDensSliders();
  initGL();

  inkLocs[0]=locs.u_ink0;inkLocs[1]=locs.u_ink1;inkLocs[2]=locs.u_ink2;inkLocs[3]=locs.u_ink3;
  offLocs[0]=locs.u_off0;offLocs[1]=locs.u_off1;offLocs[2]=locs.u_off2;offLocs[3]=locs.u_off3;
  angLocs[0]=locs.u_angle0;angLocs[1]=locs.u_angle1;angLocs[2]=locs.u_angle2;angLocs[3]=locs.u_angle3;
  chanLocs[0]=locs.u_chan0;chanLocs[1]=locs.u_chan1;chanLocs[2]=locs.u_chan2;chanLocs[3]=locs.u_chan3;
  densLocs[0]=locs.u_dens0;densLocs[1]=locs.u_dens1;densLocs[2]=locs.u_dens2;densLocs[3]=locs.u_dens3;

  applyProf(PROFILES[0]);
  setPaperColor(0);

  // Load test pattern immediately — no upload overlay needed
  loadSampleImage();

  // Initial layout
  layoutSwitch();

  // Auto-enter phone mode if running as installed PWA or on mobile device
  const isStandalone = window.matchMedia('(display-mode:standalone)').matches
    || window.matchMedia('(display-mode:fullscreen)').matches
    || window.navigator.standalone === true;
  const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
  if((isStandalone || isMobile) && !phoneActive){
    togglePhoneMode();
    // Auto-start camera in PWA mode
    if(isStandalone && !camOn) setTimeout(()=>toggleCam(),300);
  }

  // Redraw on resize/orientation change
  window.addEventListener('resize',()=>{needsRedraw=true;needsAspectUpdate=true;});

  // Undo/Redo keyboard shortcuts (Cmd+Z / Ctrl+Z, Cmd+Shift+Z / Ctrl+Shift+Z)
  document.addEventListener('keydown',e=>{
    const mod=e.metaKey||e.ctrlKey;
    if(mod && e.key==='z' && !e.shiftKey){e.preventDefault();undo();}
    if(mod && (e.key==='Z'||(e.key==='z'&&e.shiftKey))){e.preventDefault();redo();}
    if(mod && e.key==='y'){e.preventDefault();redo();}
  });
  // Initial undo snapshot
  pushUndo();

  // ─── PWA: Install as standalone app on Android/iOS ───
  const manifest={
    name:'RISO/CAM',
    short_name:'RISO/CAM',
    description:'Real-time Risograph camera simulator',
    start_url:location.href,
    display:'fullscreen',
    orientation:'any',
    background_color:'#1a1a1a',
    theme_color:'#1a1a1a',
    icons:[{
      src:'data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%27512%27 height=%27512%27 viewBox=%270 0 512 512%27%3E%3Crect width=%27512%27 height=%27512%27 rx=%2780%27 fill=%27%231a1a1a%27/%3E%3Ccircle cx=%27256%27 cy=%27230%27 r=%2795%27 stroke=%27%23f5f0e8%27 stroke-width=%2714%27 fill=%27none%27/%3E%3Ccircle cx=%27256%27 cy=%27230%27 r=%2735%27 fill=%27%23d2515e%27/%3E%3Crect x=%27156%27 y=%27365%27 width=%27200%27 height=%276%27 rx=%273%27 fill=%27%230078bf%27/%3E%3Crect x=%27156%27 y=%27385%27 width=%27200%27 height=%276%27 rx=%273%27 fill=%27%23f15060%27/%3E%3Crect x=%27156%27 y=%27405%27 width=%27200%27 height=%276%27 rx=%273%27 fill=%27%23ffe800%27/%3E%3C/svg%3E',
      sizes:'512x512',
      type:'image/svg+xml',
      purpose:'any maskable'
    }]
  };
  const mBlob=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
  const mLink=document.createElement('link');
  mLink.rel='manifest';
  mLink.href=URL.createObjectURL(mBlob);
  document.head.appendChild(mLink);

  // Minimal service worker for PWA installability
  if('serviceWorker' in navigator){
    const swCode=`self.addEventListener('fetch',e=>e.respondWith(fetch(e.request)));`;
    const swBlob=new Blob([swCode],{type:'application/javascript'});
    const swUrl=URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl).catch(()=>{});
  }

  render();
});
</script>
